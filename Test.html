<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D.U.E Station</title>

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
background:#030303;
font-family:monospace;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect} = React

const DATA = [
{
id:"DUE-VOL-01",
title:"Physics of Stalled Time",
summary:"Why unfinished events create unstable reality pockets.",
stability:9.8
},
{
id:"DUE-VOL-10",
title:"18:42 Diner Reset",
summary:"Proposal interrupted causing 5-second loop for 40 years.",
stability:1.4
},
{
id:"DUE-OBJ-99",
title:"Echoing Key",
summary:"Opens the door of the last room you occupied.",
stability:7.2
}
]

function LockScreen({unlock}){

const [progress,setProgress] = useState(0)
const [running,setRunning] = useState(false)

function start(){
setRunning(true)

let p = 0
const t = setInterval(()=>{
p+=10
setProgress(p)

if(p>=100){
clearInterval(t)
setTimeout(unlock,400)
}

},120)
}

return(
<div className="h-screen flex items-center justify-center flex-col text-yellow-400 gap-8">

<h1 className="text-4xl font-bold tracking-widest">
D.U.E ARCHIVE
</h1>

{!running && (
<button
onClick={start}
className="border px-8 py-3 hover:bg-yellow-500 hover:text-black transition">
INITIATE ACCESS
</button>
)}

{running && (
<div className="w-80">

<div className="text-xs mb-2">Decrypting node...</div>

<div className="w-full h-2 bg-gray-800">

<div
className="h-full bg-yellow-400"
style={{width:progress+"%"}}
/>

</div>

</div>
)}

</div>
)

}

function Record({item,onSelect}){

const color =
item.stability < 4
? "text-red-400"
: item.stability > 8
? "text-green-400"
: "text-yellow-400"

return(

<div
onClick={()=>onSelect(item)}
className="p-5 border border-gray-800 rounded-lg hover:border-yellow-500 cursor-pointer bg-black/50">

<div className="flex justify-between">

<div className="text-xs text-yellow-400">
{item.id}
</div>

<div className={color}>
{item.stability}
</div>

</div>

<h3 className="text-lg font-bold mt-2">
{item.title}
</h3>

<p className="text-sm text-gray-400 mt-2">
{item.summary}
</p>

</div>

)

}

function Inspector({item,close}){

if(!item) return null

return(

<div className="fixed right-0 top-0 h-full w-96 bg-black border-l border-gray-800 p-6">

<div className="flex justify-between mb-6">

<h2 className="text-xl font-bold text-yellow-400">
{item.title}
</h2>

<button onClick={close}>
X
</button>

</div>

<div className="space-y-4 text-sm">

<div>ID: {item.id}</div>

<div>Stability: {item.stability}</div>

<div>{item.summary}</div>

</div>

</div>

)

}

function Dashboard({data,onSelect}){

return(

<div className="max-w-5xl mx-auto">

<h1 className="text-3xl font-bold text-yellow-400 mb-8">
Archive Records
</h1>

<div className="grid md:grid-cols-2 gap-6">

{data.map(item=>(
<Record
key={item.id}
item={item}
onSelect={onSelect}
/>
))}

</div>

</div>

)

}

function App(){

const [locked,setLocked] = useState(true)
const [active,setActive] = useState(null)

if(locked){
return <LockScreen unlock={()=>setLocked(false)} />
}

return(

<div className="text-gray-200 p-10">

<Dashboard
data={DATA}
onSelect={setActive}
/>

<Inspector
item={active}
close={()=>setActive(null)}
/>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
